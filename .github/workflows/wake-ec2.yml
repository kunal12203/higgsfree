name: Wake EC2 for Jenkins

on:
  # pull_request_target fires ONLY after a maintainer approves the PR
  # for first-time contributors (repo setting: "Require approval for first-time contributors")
  pull_request_target:
    types: [labeled]
  push:
    branches: [main]

jobs:
  wake-ec2:
    # Only run when a maintainer adds the "approved-for-ci" label
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'pull_request_target' && github.event.label.name == 'approved-for-ci')
    runs-on: ubuntu-latest
    steps:
      - name: Start EC2 instance
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION:            us-east-1
          # L40S CI box (avatar-graperoot-l40s, g6e.8xlarge). Was the g5 worker
          # (i-02460972dbc8e315e); CI now runs on the L40S.
          INSTANCE_ID:           i-0a7c6c7bb9dee006b
        run: |
          pip install awscli -q
          STATE=$(aws ec2 describe-instances --region $AWS_REGION \
            --instance-ids $INSTANCE_ID \
            --query "Reservations[0].Instances[0].State.Name" --output text)
          echo "Instance state: $STATE"
          if [ "$STATE" = "stopped" ]; then
            aws ec2 start-instances --region $AWS_REGION --instance-ids $INSTANCE_ID
            echo "Started EC2 — Jenkins will pick up the job"
          else
            echo "Instance already $STATE"
          fi
